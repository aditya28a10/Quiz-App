<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS Quiz App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="quiz-container">
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
    
    <div id="quiz-content">
      <div id="question-counter"><p></p></div>
      <h2 id="question-text"></h2>
      <div id="options-grid"></div>
      <button id="next-btn" class="btn-primary" style="display: none;">Next Question</button>
    </div>

    <div id="results-screen" style="display: none;">
      <h2 id="score-percentage"></h2>
      <p id="score-display"></p>
      <p id="score-message"></p>
      <button id="play-again-btn" class="btn-outline">Play Again</button>
    </div>
  </div>

  <script src="quiz.js"></script>
</body>
</html>
